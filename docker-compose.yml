services:
  postgres_analitico:
    image: postgres:15
    container_name: intramax_postgres
    environment:
      POSTGRES_DB: intramax_ia
      POSTGRES_USER: intramax
      POSTGRES_PASSWORD: intramax123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - intramax_net

  etl:
    build:
      context: .
      dockerfile: Dockerfile.etl
    container_name: intramax_etl
    env_file: .env
    depends_on:
      - postgres_analitico
    networks:
      - intramax_net
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:

networks:
  intramax_net: